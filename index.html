<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">

    <title>Login</title>
</head>

<body>
    <main>
        <h1>LOGIN DEV</h1>
        <form>
            <div class="email">
                <label for="email">Email: </label><br>
                <input type="email" name="email" id="email" placeholder="abcde@....com" required>
            </div>
            <div class="senha">
                <label for="senha">Senha: </label><br>
                <input type="password" name="senha" id="pass" placeholder="Digite sua senha..." required>
            </div>
            <div class="logar">
                <label id="checkbox">Lembrar senha <input type="checkbox" id="caixa" checked></label>
                <p>Não tem conta? <a href="cadastro.html">CADASTRE-SE</a></p>
            </div>
            <div class="botaocfg">
                <button type="submit" id="botao">Logar</button>
            </div>
        </form>
        <p id="signature">By: Rycharlisson Dias</p>
    </main>
    
</body>

</html>
