<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro DEV</title>
</head>

<body>

    <main>
        <h1>CADASTRO</h1>
        <form>

            <div class="nome">
                <label for="nome">Nome:</label><br>
                <input type="text" placeholder="Nome" id="nome" required>
            </div>
            <div class="sobrenome">
                <label for="sobrenome">Sobrenome:</label><br>
                <input type="text" placeholder="Sobrenome" id="sobrenome" required>
            </div>
            <div class="email">
                <label for="Email">Email:</label><br>
                <input type="email" name="email" id="email" placeholder="Email" required>
            </div>
            <div class="senha">
                <label for="senha">Senha:</label><br>
                <input type="password" name="" id="" required placeholder="Senha">
            </div>

            <div class="botaocfg">

                <p>Já tem uma conta? <a href="index.html" target="_self">VOLTAR</a></p>

                <button type="submit" id="botao">Cadastrar</button>
            </div>
        </form>
    </main>
</body>

</html>
