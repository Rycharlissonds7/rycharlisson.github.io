    <main>
        <form>
            <h1>LOGIN DEV</h1>
            <div class="login">

            <div class="senha">
                <label>Senha</label><br>

            <div class="Logar">
                <label for="checkbox">Deseja lembrar sua senha?</label><input type="checkbox" name="checkbox" class="checkbox" checked>
            
                <button type="submit" id="botao">Logar</button>
            </div>
        </form>
